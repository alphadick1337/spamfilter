<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>AI Textanalys - Svenska Filmomdömen</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; flex-direction: column; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:disabled { background-color: #ccc; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 6px; background-color: #f9f9f9; display: none; }
        .error-box { margin-top: 20px; padding: 15px; border-radius: 6px; background-color: #ffebee; color: #b71c1c; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Analysera Omdöme</h1>
    <div id="status" style="text-align: center; margin-bottom: 10px;">Laddar modell...</div>
    <textarea id="inputText" placeholder="Skriv något här..."></textarea>
    <button id="analyzeBtn" onclick="predict()" disabled>Analysera Text</button>
    <div id="errorBox" class="error-box"></div>
    <div id="resultBox" class="result-box">
        <strong id="predictionResult"></strong>
        <div id="probabilities" style="margin-top: 10px;"></div>
    </div>
</div>

<script>
    let model, metadata;
    // VIKTIGT: Denna måste matcha mappnamnet på GitHub exakt!
    const MODEL_PATH = 'tfjs_model/'; 

    async function loadModel() {
        const statusEl = document.getElementById('status');
        const btn = document.getElementById('analyzeBtn');
        try {
            // Vi lägger till en unik parameter för att tvinga webbläsaren att hämta de nya filerna
            const cacheBuster = "?v=" + new Date().getTime();
            
            const metaRes = await fetch(`${MODEL_PATH}metadata.json${cacheBuster}`);
            if (!metaRes.ok) throw new Error("Hittade inte metadata.json i tfjs_model/");
            metadata = await metaRes.json();

            model = await tf.loadLayersModel(`${MODEL_PATH}model.json${cacheBuster}`, { strict: false });
            
            statusEl.innerText = "Modell redo!";
            statusEl.style.color = "green";
            btn.disabled = false;
        } catch (err) {
            document.getElementById('errorBox').style.display = 'block';
            document.getElementById('errorBox').innerText = "Laddningsfel: " + err.message;
            statusEl.innerText = "Ett fel uppstod.";
        }
    }

    loadModel();

    async function predict() {
        const text = document.getElementById('inputText').value;
        if (!text.trim()) return;

        try {
            // Tokenisering
            const words = text.toLowerCase().replace(/[.,!?;:]/g, '').split(/\s+/);
            const seq = words.map(word => metadata.word_index[word] || metadata.word_index[metadata.oov_token] || 1);
            
            // Padding
            const padded = new Array(metadata.max_length).fill(0);
            for (let i = 0; i < Math.min(seq.length, metadata.max_length); i++) {
                padded[i] = seq[i];
            }

            const input = tf.tensor2d([padded], [1, metadata.max_length]);
            const prediction = model.predict(input);
            const probs = await prediction.data();
            
            const maxIdx = probs.indexOf(Math.max(...probs));
            const labels = Object.values(metadata.labels); // Fixar objekt/lista-problemet
            const resultLabel = String(labels[maxIdx] || "Okänd");

            document.getElementById('predictionResult').innerText = "Bedömning: " + resultLabel.toUpperCase();
            document.getElementById('resultBox').style.display = 'block';

            input.dispose();
            prediction.dispose();
        } catch (err) {
            alert("Analysfel: " + err.message);
        }
    }
</script>
</body>
</html>
